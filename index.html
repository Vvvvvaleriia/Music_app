<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="main.css" />
		<title>Document</title>
	</head>
	<body>
		<div class="search">
			<button id="login" class="btnToLogin">login</button>
			<input type="text" placeholder="Enter a song" class="name-inp" />
			<button class="srch-btn">Search</button>
			<ol class="list-song"></ol>
		</div>
		<div class="saved">
			<p id="save-track">Saved tracks</p>
			<ol class="list-saved"></ol>
		</div>
		<div class="block">
			<div class="track-general">
				<div id="imgInfo" class="img-container"></div>
				<div class="track-info">
					<p id="track-name" class="songNameInfo">Song name</p>
					<p id="track-artist" class="songArtistInfo">Song artist</p>
				</div>
			</div>
			<div class="play">
				<button id="toggle-btn" class="btnToPlay">Play</button>
			</div>
			<div class="control">
				<p id="volume-persent" class="vlm">Volume</p>
				<button id="volume-up" class="btnUp">+</button>
				<button id="volume-down" class="btnDown">-</button>
			</div>
		</div>
		<script src="https://sdk.scdn.co/spotify-player.js"></script>
		<script src="main.js"></script>
	</body>
</html>
