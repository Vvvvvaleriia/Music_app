<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="main.css" />
		<title>Document</title>
	</head>
	<body class="login-mode">
		<div class="login-page">
			<h1 class="welcome">Login before start</h1>
			<button id="login" class="btnToLogin">login</button>
		</div>
		<button class="exit-btn" hidden>Exit</button>
		<div class="app-mode">
			<div class="header-control">
				<div class="search">
					<input
						type="text"
						placeholder="Enter a song"
						class="name-inp"
						hidden
					/>
					<button class="srch-btn" hidden>Search</button>
					<ol class="list-song"></ol>
				</div>

				<div class="history-container">
					<input
						type="text"
						placeholder="Enter date"
						class="search-date"
						hidden
					/>
					<button class="btn-seachDate" hidden>Search</button>
				</div>
			</div>
			<div class="main-content">
				<div id="save-track" class="save-track" hidden>
					Saved tracks
				</div>
				<div class="tracks"></div>
			</div>

			<div class="block" hidden>
				<div class="track-general">
					<div id="imgInfo" class="img-container"></div>
					<div class="track-info">
						<p id="track-name" class="songNameInfo" hidden>
							Song name
						</p>
						<p id="track-artist" class="songArtistInfo" hidden>
							Song artist
						</p>
					</div>
				</div>

				<div class="play">
					<button id="toggle-btn" class="btnToPlay" hidden>
						Play
					</button>
					<input
						type="number"
						id="time-input"
						class="time-input"
						placeholder="seconds"
						hidden
					/>
					<button id="set-time" class="set-time" hidden>
						Set time
					</button>
					<div class="time">
						<p id="current-time" class="current-time" hidden>
							00:00
						</p>
						<p id="duration" class="duration" hidden>00:00</p>
					</div>
				</div>

				<div class="control">
					<p id="volume-persent" class="vlm" hidden>Volume</p>
					<button id="volume-up" class="btnUp" hidden>+</button>
					<button id="volume-down" class="btnDown" hidden>-</button>
				</div>
			</div>

			<div class="history-panel" hidden></div>
		</div>

		<script src="https://sdk.scdn.co/spotify-player.js" defer></script>
		<script type="module" src="src/js/main.js" defer></script>
	</body>
</html>
